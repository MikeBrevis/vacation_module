<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AndeCorp</title>
  <meta name="description" content="Acceso al sistema de registro y control vacacional.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Use Google Fonts (Anton & Inter/Roboto as per ande_design) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="logo.png" alt="AndeCorp Logo">
        <h2 class="login-title">Iniciar Sesión</h2>
      </div>
      
      <div id="loginAlert" class="alert alert-danger alert-message" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="usuario" class="form-label">Usuario</label>
          <input type="text" class="form-control" id="usuario" name="usuario" required autocomplete="username">
        </div>
        <div class="mb-4 position-relative">
          <label for="contraseña" class="form-label">Contraseña</label>
          <input type="password" class="form-control pe-5" id="contraseña" name="contraseña" required autocomplete="current-password">
          <button type="button" id="togglePassword" class="btn position-absolute bottom-0 end-0 mb-0 me-1" style="border: none; background: transparent; color: var(--blue); padding: 0.375rem 0.75rem;">
            <i class="bi bi-eye" id="toggleIcon" style="font-size: 1.2rem;"></i>
          </button>
        </div>
        <button type="submit" class="myButton">Ingresar</button>
      </form>
    </div>
  </div>

  <script src="assets/js/login.js"></script>
</body>
</html>
